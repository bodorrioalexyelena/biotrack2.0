name: Desplegar BioTrack Independiente

on:
  push:
    branches:
      - main # Si tu rama principal se llama 'master', cambia 'main' por 'master'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Compilar aplicación
        run: npm run build

      - name: Configurar entorno de Pages
        uses: actions/configure-pages@v4

      - name: Subir paquete compilado
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build' # Si tu proyecto usa Vite en vez de Create React App, cambia './build' por './dist'

      - name: Publicar en internet
        id: deployment
        uses: actions/deploy-pages@v4
